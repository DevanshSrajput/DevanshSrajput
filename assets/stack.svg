  <text x="534" y="144" class="mono sval">75%</text>
  <rect x="296" y="147" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="147" width="0"   height="7" rx="3" class="bar-orange"><animate attributeName="width" from="0" to="179" dur="0.7s" begin="1.0s" fill="freeze"/></rect>

