<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" width="900" height="360">
  <defs>
    <style>
      .bg { fill: #06080f; }
      .fn { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; }
      .fm { font-family: 'Courier New',Courier,monospace; }
      .hdr { font-size: 14px; fill: #e0e7ff; font-weight: 700; letter-spacing: 0.5px; }
      .hsub { font-size: 10px; fill: #475569; }
      .cat { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; }
      .skill-name { font-size: 11px; fill: #cbd5e1; font-weight: 500; }
      .skill-pct { font-size: 9px; fill: #64748b; font-weight: 700; text-anchor: end; }
      .bar-track { fill: #1e293b; rx: 3; }
      .panel-bg { fill: #0d1224; stroke: #1e293b; stroke-width: 1; }
      .pill-name { font-size: 9px; font-weight: 600; text-anchor: middle; }
      .widget-title { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
      .widget-label { font-size: 9px; fill: #94a3b8; }
      .widget-val { font-size: 9px; fill: #cbd5e1; font-weight: 600; }
    </style>

    <!-- Bar fill gradients -->
    <linearGradient id="fill-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
