  <text x="534" y="268" class="mono sval">88%</text>
  <rect x="296" y="271" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="271" width="0"   height="7" rx="3" class="bar-purple"><animate attributeName="width" from="0" to="210" dur="0.7s" begin="1.4s" fill="freeze"/></rect>

