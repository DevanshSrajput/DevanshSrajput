<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" width="900" height="340">
  <defs>
    <style>
      
      .mono { font-family: 'Courier New',Courier,monospace; }
      .bg   { fill: #0d1117; }

      /* Lane label */
      .lane-label { font-size: 9px; fill: #444d56; letter-spacing: 1px; }

      /* Skill bar track */
      .track { fill: #161b22; rx: 3; }

      /* Animated fill bars */
      .bar { rx: 3; }
      .bar-green  { fill: url(#gGreen);  }
      .bar-blue   { fill: url(#gBlue);   }
      .bar-orange { fill: url(#gOrange); }
      .bar-purple { fill: url(#gPurple); }
      .bar-pink   { fill: url(#gPink);   }
      .bar-yellow { fill: url(#gYellow); }

      /* Stagger grow animations */
      .b0  { animation: grow 0.7s 0.0s cubic-bezier(.4,0,.2,1) both; }
      .b1  { animation: grow 0.7s 0.1s cubic-bezier(.4,0,.2,1) both; }
      .b2  { animation: grow 0.7s 0.2s cubic-bezier(.4,0,.2,1) both; }
      .b3  { animation: grow 0.7s 0.3s cubic-bezier(.4,0,.2,1) both; }
      .b4  { animation: grow 0.7s 0.4s cubic-bezier(.4,0,.2,1) both; }
      .b5  { animation: grow 0.7s 0.5s cubic-bezier(.4,0,.2,1) both; }
      .b6  { animation: grow 0.7s 0.6s cubic-bezier(.4,0,.2,1) both; }
      .b7  { animation: grow 0.7s 0.7s cubic-bezier(.4,0,.2,1) both; }
      .b8  { animation: grow 0.7s 0.8s cubic-bezier(.4,0,.2,1) both; }
      .b9  { animation: grow 0.7s 0.9s cubic-bezier(.4,0,.2,1) both; }
      .b10 { animation: grow 0.7s 1.0s cubic-bezier(.4,0,.2,1) both; }
      .b11 { animation: grow 0.7s 1.1s cubic-bezier(.4,0,.2,1) both; }
      .b12 { animation: grow 0.7s 1.2s cubic-bezier(.4,0,.2,1) both; }
      .b13 { animation: grow 0.7s 1.3s cubic-bezier(.4,0,.2,1) both; }
      .b14 { animation: grow 0.7s 1.4s cubic-bezier(.4,0,.2,1) both; }
      .b15 { animation: grow 0.7s 1.5s cubic-bezier(.4,0,.2,1) both; }

      @keyframes grow {
        from { transform: scaleX(0); transform-origin: left; }
        to   { transform: scaleX(1); transform-origin: left; }
      }

      /* skill name */
      .sname { font-size: 11px; fill: #c9d1d9; }
      .sval  { font-size: 10px; fill: #444d56; text-anchor: end; }

      /* Section header */
      .sec { font-size: 10px; letter-spacing: 2px; }

      /* Right panel — currently block */
      .cp-bg { fill: #161b22; stroke: #00ff4130; stroke-width: 1; }
      .cp-title { font-size: 11px; fill: #00ff41; }
      .cp-line  { font-size: 10px; fill: #8b949e; }
      .cp-dim   { font-size: 9px;  fill: #444d56; }

      /* Pulse dot */
      .pdot { fill: #00ff41; }
      .pdot-ring { fill: none; stroke: #00ff41; stroke-width: 1.5; opacity: 0; animation: ring 2s 0.5s ease-out infinite; }
      @keyframes ring {
        0%   { r: 5;  opacity: 0.8; }
        100% { r: 14; opacity: 0; }
      }

      /* Category dot */
      .dot-green  { fill: #00ff41; }
      .dot-blue   { fill: #00bfff; }
      .dot-orange { fill: #ff6b35; }
      .dot-purple { fill: #a371f7; }
      .dot-pink   { fill: #f778ba; }
      .dot-yellow { fill: #ffd700; }

      /* Header */
      .hdr  { font-size: 15px; fill: #00ff41; }
      .hsub { font-size: 11px; fill: #444d56; }
    </style>

    <!-- Gradient fills for bars -->
    <linearGradient id="gGreen"  x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00cc33" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gBlue"   x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00bfff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0090cc" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a371f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c44cc" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gPink"   x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f778ba" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cc4488" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gYellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ccaa00" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="900" height="340" class="bg" rx="8"/>

  <!-- Header -->
  <text x="20" y="28" class="mono hdr">&gt; cat ./stack.conf</text>
  <text x="20" y="46" class="mono hsub">proficiency by domain · built things in all of these</text>
  <line x1="20" y1="54" x2="880" y2="54" stroke="#00ff4125" stroke-width="1"/>

  <!-- ══════════════════════════════════════
       LEFT PANEL — Skill bars (col 1 + col 2)
       Track width = 220, x start = 20
       Bar row height = 22, start y = 72
  ══════════════════════════════════════ -->

  <!-- COL 1 — left (x: 20..260) -->

  <!-- Category: Deep Learning -->
  <circle cx="28" cy="75" r="4" class="dot-green"/>
  <text x="38" y="79" class="mono sec dot-green">DEEP LEARNING</text>

  <!-- PyTorch -->
  <text x="20"  y="100" class="mono sname">PyTorch</text>
  <text x="258" y="100" class="mono sval">95%</text>
  <rect x="20" y="103" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="103" width="226" height="7" class="bar bar-green b0"/>

  <!-- TensorFlow -->
  <text x="20"  y="122" class="mono sname">TensorFlow</text>
  <text x="258" y="122" class="mono sval">78%</text>
  <rect x="20" y="125" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="125" width="185" height="7" class="bar bar-green b1"/>

  <!-- HuggingFace -->
  <text x="20"  y="144" class="mono sname">HuggingFace</text>
  <text x="258" y="144" class="mono sval">90%</text>
  <rect x="20" y="147" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="147" width="214" height="7" class="bar bar-green b2"/>

  <!-- OpenCV -->
  <text x="20"  y="166" class="mono sname">OpenCV</text>
  <text x="258" y="166" class="mono sval">82%</text>
  <rect x="20" y="169" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="169" width="195" height="7" class="bar bar-green b3"/>

  <!-- Divider -->
  <line x1="20" y1="188" x2="258" y2="188" stroke="#ffffff08" stroke-width="1"/>

  <!-- Category: NLP / LLMs -->
  <circle cx="28" cy="202" r="4" class="dot-blue"/>
  <text x="38" y="206" class="mono sec dot-blue">NLP / LLMs</text>

  <!-- Transformers -->
  <text x="20"  y="224" class="mono sname">Transformers</text>
  <text x="258" y="224" class="mono sval">88%</text>
  <rect x="20" y="227" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="227" width="210" height="7" class="bar bar-blue b4"/>

  <!-- llama.cpp -->
  <text x="20"  y="246" class="mono sname">llama.cpp</text>
  <text x="258" y="246" class="mono sval">85%</text>
  <rect x="20" y="249" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="249" width="202" height="7" class="bar bar-blue b5"/>

  <!-- Fine-tuning -->
  <text x="20"  y="268" class="mono sname">Fine-tuning (SFT)</text>
  <text x="258" y="268" class="mono sval">80%</text>
  <rect x="20" y="271" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="271" width="190" height="7" class="bar bar-blue b6"/>

  <!-- RAG -->
  <text x="20"  y="290" class="mono sname">RAG / ChromaDB</text>
  <text x="258" y="290" class="mono sval">83%</text>
  <rect x="20" y="293" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="20" y="293" width="198" height="7" class="bar bar-blue b7"/>

  <!-- Vertical divider between cols -->
  <line x1="278" y1="60" x2="278" y2="330" stroke="#ffffff08" stroke-width="1"/>

  <!-- COL 2 — middle (x: 296..536) -->

  <!-- Category: Agentic / MLOps -->
  <circle cx="304" cy="75" r="4" class="dot-orange"/>
  <text x="314" y="79" class="mono sec dot-orange">AGENTIC / MLOPS</text>

  <!-- LangGraph -->
  <text x="296" y="100" class="mono sname">LangGraph</text>
  <text x="534" y="100" class="mono sval">88%</text>
  <rect x="296" y="103" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="103" width="210" height="7" class="bar bar-orange b8"/>

  <!-- FastAPI -->
  <text x="296" y="122" class="mono sname">FastAPI</text>
  <text x="534" y="122" class="mono sval">90%</text>
  <rect x="296" y="125" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="125" width="214" height="7" class="bar bar-orange b9"/>

  <!-- Docker -->
  <text x="296" y="144" class="mono sname">Docker</text>
  <text x="534" y="144" class="mono sval">75%</text>
  <rect x="296" y="147" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="147" width="179" height="7" class="bar bar-orange b10"/>

  <!-- scikit-learn -->
  <text x="296" y="166" class="mono sname">scikit-learn</text>
  <text x="534" y="166" class="mono sval">87%</text>
  <rect x="296" y="169" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="169" width="207" height="7" class="bar bar-orange b11"/>

  <!-- Divider -->
  <line x1="296" y1="188" x2="534" y2="188" stroke="#ffffff08" stroke-width="1"/>

  <!-- Category: Systems / Infra -->
  <circle cx="304" cy="202" r="4" class="dot-purple"/>
  <text x="314" y="206" class="mono sec dot-purple">SYSTEMS / INFRA</text>

  <!-- Python -->
  <text x="296" y="224" class="mono sname">Python</text>
  <text x="534" y="224" class="mono sval">95%</text>
  <rect x="296" y="227" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="227" width="226" height="7" class="bar bar-purple b12"/>

  <!-- C++ -->
  <text x="296" y="246" class="mono sname">C++</text>
  <text x="534" y="246" class="mono sval">70%</text>
  <rect x="296" y="249" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="249" width="167" height="7" class="bar bar-purple b13"/>

  <!-- Linux / Bash -->
  <text x="296" y="268" class="mono sname">Linux / Bash</text>
  <text x="534" y="268" class="mono sval">88%</text>
  <rect x="296" y="271" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="271" width="210" height="7" class="bar bar-purple b14"/>

  <!-- Flutter -->
  <text x="296" y="290" class="mono sname">Flutter</text>
  <text x="534" y="290" class="mono sval">65%</text>
  <rect x="296" y="293" width="238" height="7" rx="3" fill="#ffffff08"/>
  <rect x="296" y="293" width="155" height="7" class="bar bar-pink b15"/>

  <!-- Vertical divider -->
  <line x1="554" y1="60" x2="554" y2="330" stroke="#ffffff08" stroke-width="1"/>

  <!-- ══════════════════════════════════════
       RIGHT PANEL — Currently block + legend
  ══════════════════════════════════════ -->

  <!-- Currently Running box -->
  <rect x="568" y="68" width="312" height="130" rx="6" class="cp-bg"/>

  <!-- Pulsing live indicator -->
  <circle cx="585" cy="85" r="5" class="pdot"/>
  <circle cx="585" cy="85" r="5" class="pdot-ring"/>
  <text x="596" y="89" class="mono cp-title">CURRENTLY RUNNING</text>

  <text x="580" y="110" class="mono cp-line">Model:   Qwen2.5-1.5B (fine-tuned)</text>
  <text x="580" y="126" class="mono cp-line">Hw:      Jetson AGX Orin + Orin NX</text>
  <text x="580" y="142" class="mono cp-line">Net:     TailScale mesh (hostel → lab)</text>
  <text x="580" y="158" class="mono cp-line">Target:  HiSLM paper · Jun 25 deadline</text>

  <!-- Blinking cursor -->
  <rect x="580" y="166" width="6" height="11" fill="#00ff41">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="591" y="176" class="mono cp-dim">loss: 0.24 and falling...</text>

  <!-- Legend / tag cloud box -->
  <rect x="568" y="210" width="312" height="116" rx="6" fill="#161b22" stroke="#ffffff08" stroke-width="1"/>
  <text x="580" y="228" class="mono cp-title">ALSO USED IN SHIPPED PROJECTS</text>

  <!-- Tag row 1 -->
  <rect x="580" y="236" width="60" height="18" rx="3" fill="#00ff4115" stroke="#00ff4140" stroke-width="0.5"/>
  <text x="610" y="249" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00ff41">Pandas</text>

  <rect x="648" y="236" width="66" height="18" rx="3" fill="#00bfff15" stroke="#00bfff40" stroke-width="0.5"/>
  <text x="681" y="249" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00bfff">Streamlit</text>

  <rect x="722" y="236" width="56" height="18" rx="3" fill="#ff6b3515" stroke="#ff6b3540" stroke-width="0.5"/>
  <text x="750" y="249" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#ff6b35">SQLite</text>

  <rect x="786" y="236" width="82" height="18" rx="3" fill="#a371f715" stroke="#a371f740" stroke-width="0.5"/>
  <text x="827" y="249" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#a371f7">LangChain</text>

  <!-- Tag row 2 -->
  <rect x="580" y="262" width="52" height="18" rx="3" fill="#ffd70015" stroke="#ffd70040" stroke-width="0.5"/>
  <text x="606" y="275" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#ffd700">Jupyter</text>

  <rect x="640" y="262" width="46" height="18" rx="3" fill="#f778ba15" stroke="#f778ba40" stroke-width="0.5"/>
  <text x="663" y="275" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#f778ba">Gemini</text>

  <rect x="694" y="262" width="58" height="18" rx="3" fill="#00ff4115" stroke="#00ff4140" stroke-width="0.5"/>
  <text x="723" y="275" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00ff41">YOLOv8</text>

  <rect x="760" y="262" width="46" height="18" rx="3" fill="#00bfff15" stroke="#00bfff40" stroke-width="0.5"/>
  <text x="783" y="275" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00bfff">NLTK</text>

  <rect x="814" y="262" width="54" height="18" rx="3" fill="#ff6b3515" stroke="#ff6b3540" stroke-width="0.5"/>
  <text x="841" y="275" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#ff6b35">Plotly</text>

  <!-- Tag row 3 -->
  <rect x="580" y="288" width="68" height="18" rx="3" fill="#a371f715" stroke="#a371f740" stroke-width="0.5"/>
  <text x="614" y="301" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#a371f7">x402 proto</text>

  <rect x="656" y="288" width="54" height="18" rx="3" fill="#ffd70015" stroke="#ffd70040" stroke-width="0.5"/>
  <text x="683" y="301" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#ffd700">TailScale</text>

  <rect x="718" y="288" width="52" height="18" rx="3" fill="#00ff4115" stroke="#00ff4140" stroke-width="0.5"/>
  <text x="744" y="301" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#00ff41">CUDA</text>

  <rect x="778" y="288" width="90" height="18" rx="3" fill="#f778ba15" stroke="#f778ba40" stroke-width="0.5"/>
  <text x="823" y="301" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="10" fill="#f778ba">JetPack 6.x</text>

  <!-- Bottom disclaimer -->
  <text x="580" y="320" font-family="'Courier New',Courier,monospace" font-size="9" fill="#2d333b">
    * bars = self-assessed · only claiming tools with github evidence
  </text>

  <!-- Bottom border -->
  <line x1="20" y1="332" x2="880" y2="332" stroke="#00ff4125" stroke-width="1"/>
  <text x="880" y="328" text-anchor="end" font-family="'Courier New',Courier,monospace" font-size="9" fill="#2d333b">devanshsingh.dev</text>
</svg>
