<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" width="900" height="280">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .grid-line { stroke: #00ff4115; stroke-width: 0.5; }
      .scanline { fill: none; stroke: url(#scanGrad); stroke-width: 2; }
      .name-text { font-family: 'Courier New',Courier,monospace; font-size: 52px; font-weight: 700; fill: #00ff41; filter: url(#glow); }
      .role1 { fill: #00ff41; font-family: 'Courier New',Courier,monospace; font-size: 13px; }
      .role2 { fill: #00bfff; font-family: 'Courier New',Courier,monospace; font-size: 13px; }
      .role3 { fill: #ff6b35; font-family: 'Courier New',Courier,monospace; font-size: 13px; }
      .role4 { fill: #c9d1d9; font-family: 'Courier New',Courier,monospace; font-size: 13px; }
      .tag1 { stroke: #00ff41; fill: #00ff4110; stroke-width: 1; }
      .tag2 { stroke: #00bfff; fill: #00bfff10; stroke-width: 1; }
      .tag3 { stroke: #ff6b35; fill: #ff6b3510; stroke-width: 1; }
      .tag4 { stroke: #c9d1d9; fill: #c9d1d910; stroke-width: 1; }
      .subtitle { font-family: 'Courier New',Courier,monospace; font-size: 14px; fill: #8b949e; }
      .bracket { stroke: #00ff41; stroke-width: 1.5; fill: none; }
      .matrix-col { font-family: 'Courier New',Courier,monospace; font-size: 11px; fill: #00ff41; }
      .status-dot { fill: #00ff41; }
      .cursor { fill: #00ff41; }
    </style>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="leftClip"><rect x="0" y="0" width="200" height="280"/></clipPath>
    <clipPath id="rightClip"><rect x="700" y="0" width="200" height="280"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg" rx="8"/>

  <!-- Grid lines -->
  <g opacity="0.3">
    <line x1="0" y1="40" x2="900" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="900" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="900" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="900" y2="240" class="grid-line"/>
    <line x1="60" y1="0" x2="60" y2="280" class="grid-line"/>
    <line x1="840" y1="0" x2="840" y2="280" class="grid-line"/>
  </g>

  <!-- Matrix rain LEFT — SMIL translateY + opacity -->
  <g clip-path="url(#leftClip)" opacity="0.25">
    <text x="10"  class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.1s" begin="0s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.1s" begin="0s"   repeatCount="indefinite"/>1 0 1 A F 2 9 B 0 1 C 3 D</text>
    <text x="30"  class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.6s" begin="0.3s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.6s" begin="0.3s"  repeatCount="indefinite"/>A 0 0 1 F 3 9 7 B 2 E 1 D</text>
    <text x="50"  class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="1.9s" begin="0.7s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="1.9s" begin="0.7s"  repeatCount="indefinite"/>0 1 B E 3 7 A 0 F 1 2 9 C</text>
    <text x="70"  class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.3s" begin="1.1s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.3s" begin="1.1s"  repeatCount="indefinite"/>F 2 1 0 9 A B 3 7 E D 1 0</text>
    <text x="90"  class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.8s" begin="0.5s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.8s" begin="0.5s"  repeatCount="indefinite"/>3 A 0 F 2 1 E B 9 7 0 D C</text>
    <text x="110" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.0s" begin="1.4s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.0s" begin="1.4s"  repeatCount="indefinite"/>E 1 9 0 A 3 7 F 2 B D 0 1</text>
    <text x="130" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.5s" begin="0.2s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.5s" begin="0.2s"  repeatCount="indefinite"/>0 B 2 A 1 F 3 9 7 E 0 D B</text>
    <text x="150" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="1.8s" begin="0.9s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="1.8s" begin="0.9s"  repeatCount="indefinite"/>9 0 A E 1 B 3 F 7 2 D 0 1</text>
    <text x="170" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.2s" begin="1.7s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.2s" begin="1.7s"  repeatCount="indefinite"/>B 1 0 3 A 7 9 F 2 E D 1 0</text>
    <text x="190" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.7s" begin="0.6s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.7s" begin="0.6s"  repeatCount="indefinite"/>7 E 0 A 1 B 2 F 9 3 D 0 1</text>
  </g>

  <!-- Matrix rain RIGHT -->
  <g clip-path="url(#rightClip)" opacity="0.25">
    <text x="710" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.3s" begin="1.1s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.3s" begin="1.1s"  repeatCount="indefinite"/>1 0 F 2 9 A B 3 E 7 D 0 1</text>
    <text x="730" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.1s" begin="0s"    repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.1s" begin="0s"    repeatCount="indefinite"/>A B 2 0 1 F 3 7 9 E D 1 0</text>
    <text x="750" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.5s" begin="0.2s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.5s" begin="0.2s"  repeatCount="indefinite"/>0 1 E A 3 7 B F 2 9 D 0 1</text>
    <text x="770" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="1.9s" begin="0.7s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="1.9s" begin="0.7s"  repeatCount="indefinite"/>F 0 9 1 A 3 B 7 2 E D 0 1</text>
    <text x="790" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.2s" begin="1.7s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.2s" begin="1.7s"  repeatCount="indefinite"/>3 A 0 E 1 F B 9 7 2 D 1 0</text>
    <text x="810" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.8s" begin="0.5s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.8s" begin="0.5s"  repeatCount="indefinite"/>E 1 B 0 A 2 F 3 7 9 D 0 1</text>
    <text x="830" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="1.8s" begin="0.9s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="1.8s" begin="0.9s"  repeatCount="indefinite"/>0 B 1 A 3 7 F 2 9 E D 1 0</text>
    <text x="850" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.6s" begin="0.3s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.6s" begin="0.3s"  repeatCount="indefinite"/>9 0 A 1 B 3 E F 7 2 D 0 1</text>
    <text x="870" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.0s" begin="1.4s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.0s" begin="1.4s"  repeatCount="indefinite"/>B 1 0 A 2 F 9 3 7 E D 1 0</text>
    <text x="890" class="matrix-col"><animateTransform attributeName="transform" type="translate" from="0 -40" to="0 330" dur="2.7s" begin="0.6s"  repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.4;0" keyTimes="0;0.7;1" dur="2.7s" begin="0.6s"  repeatCount="indefinite"/>7 E 1 0 A 9 B 3 F 2 D 1 0</text>
  </g>

  <!-- Corner brackets — SMIL opacity pulse -->
  <polyline points="20,20 20,8 32,8" class="bracket">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" begin="0s"   repeatCount="indefinite"/>
  </polyline>
  <polyline points="868,20 868,8 856,8" class="bracket">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </polyline>
  <polyline points="20,260 20,272 32,272" class="bracket">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" begin="1s"   repeatCount="indefinite"/>
  </polyline>
  <polyline points="868,260 868,272 856,272" class="bracket">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </polyline>

  <!-- Scan line — SMIL y1/y2 sweep + opacity -->
  <line x1="60" x2="840" class="scanline">
    <animate attributeName="y1" values="-10;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="-10;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Status dot — SMIL pulse -->
  <circle cx="78" cy="22" r="4" class="status-dot">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="4;6;4"   dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="90" y="27" font-family="'Courier New',Courier,monospace" font-size="11" fill="#8b949e">SYSTEM ONLINE — ACTIVELY BUILDING</text>

  <!-- Main name — filter on both CSS and presentation attribute for robustness -->
  <text x="450" y="110" text-anchor="middle" class="name-text" filter="url(#glow)">DEVANSH SINGH RAJPUT</text>

  <!-- Cursor — SMIL blink -->
  <rect x="776" y="80" width="3" height="38" class="cursor">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle — SMIL fade-in (was opacity:0 + CSS animation, now SMIL) -->
  <text x="450" y="138" text-anchor="middle" class="subtitle" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.8s" fill="freeze"/>CS Undergrad @ SRM-IST  ·  Research Intern @ IIT(ISM) Dhanbad  ·  2027</text>

  <!-- Role tags — centered group (130+150+13)*4 = 639px, start=130, center=450 -->
  <!-- Tag 1: Edge AI / LLMs -->
  <rect x="130" y="160" width="150" height="26" rx="4" class="tag1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="205" y="178" text-anchor="middle" class="role1" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.6s" fill="freeze"/>Edge AI / LLMs</text>

  <!-- Tag 2: MLOps & Systems -->
  <rect x="293" y="160" width="150" height="26" rx="4" class="tag2" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="368" y="178" text-anchor="middle" class="role2" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.6s" fill="freeze"/>MLOps &amp; Systems</text>

  <!-- Tag 3: Data Science -->
  <rect x="456" y="160" width="150" height="26" rx="4" class="tag3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="531" y="178" text-anchor="middle" class="role3" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.6s" fill="freeze"/>Data Science</text>

  <!-- Tag 4: Agentic Systems -->
  <rect x="619" y="160" width="150" height="26" rx="4" class="tag4" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="694" y="178" text-anchor="middle" class="role4" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.6s" fill="freeze"/>Agentic Systems</text>

  <!-- Progress bar track -->
  <rect x="110" y="228" width="680" height="2" rx="1" fill="#ffffff10"/>
  <!-- Progress bar fill — inline SMIL (no xlink:href needed) -->
  <rect x="110" y="228" width="0" height="2" rx="1" fill="#00ff41">
    <animate attributeName="width" from="0" to="680" dur="2.5s" begin="1.8s" fill="freeze"/>
  </rect>

  <!-- Bottom text -->
  <text x="110" y="255" font-family="'Courier New',Courier,monospace" font-size="11" fill="#444d56">CGPA 8.91  ·  47+ REPOS  ·  AMAZON ML SUMMER SCHOOL '25  ·  ACM WEBMASTER @ SRMIST</text>
  <text x="790" y="255" font-family="'Courier New',Courier,monospace" font-size="11" fill="#00ff4160" text-anchor="end">devanshsingh.dev</text>
</svg>
