<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" width="900" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #00ff4115; stroke-width: 0.5; }

      /* Scan line sweep */
      .scanline {
        fill: none;
        stroke: url(#scanGrad);
        stroke-width: 2;
        animation: scan 3s linear infinite;
      }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        5%   { opacity: 1; }
        95%  { opacity: 1; }
        100% { transform: translateY(300px); opacity: 0; }
      }

      /* Name glow pulse */
      .name-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 52px;
        font-weight: 700;
        fill: #00ff41;
        filter: url(#glow);
        animation: nameGlow 2.5s ease-in-out infinite alternate;
      }
      @keyframes nameGlow {
        0%   { filter: url(#glow) brightness(1); }
        100% { filter: url(#glowBright) brightness(1.3); }
      }

      /* Role tags fade in staggered */
      .role1 { fill: #00ff41; font-family: 'Share Tech Mono', monospace; font-size: 13px; opacity: 0; animation: fadeSlide 0.6s 0.4s ease forwards; }
      .role2 { fill: #00bfff; font-family: 'Share Tech Mono', monospace; font-size: 13px; opacity: 0; animation: fadeSlide 0.6s 0.8s ease forwards; }
      .role3 { fill: #ff6b35; font-family: 'Share Tech Mono', monospace; font-size: 13px; opacity: 0; animation: fadeSlide 0.6s 1.2s ease forwards; }
      .role4 { fill: #c9d1d9; font-family: 'Share Tech Mono', monospace; font-size: 13px; opacity: 0; animation: fadeSlide 0.6s 1.6s ease forwards; }
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* Tag box */
      .tag-box { fill: none; stroke-width: 1; rx: 4; }
      .tag1 { stroke: #00ff41; fill: #00ff4110; opacity: 0; animation: fadeSlide 0.6s 0.4s ease forwards; }
      .tag2 { stroke: #00bfff; fill: #00bfff10; opacity: 0; animation: fadeSlide 0.6s 0.8s ease forwards; }
      .tag3 { stroke: #ff6b35; fill: #ff6b3510; opacity: 0; animation: fadeSlide 0.6s 1.2s ease forwards; }
      .tag4 { stroke: #c9d1d9; fill: #c9d1d910; opacity: 0; animation: fadeSlide 0.6s 1.6s ease forwards; }

      /* Subtitle */
      .subtitle {
        font-family: 'Share Tech Mono', monospace;
        font-size: 14px;
        fill: #8b949e;
        opacity: 0;
        animation: fadeSlide 0.8s 2s ease forwards;
      }

      /* Corner brackets animation */
      .bracket {
        stroke: #00ff41;
        stroke-width: 1.5;
        fill: none;
        opacity: 0.4;
        animation: bracketPulse 3s ease-in-out infinite;
      }
      @keyframes bracketPulse {
        0%, 100% { opacity: 0.2; }
        50%       { opacity: 0.7; }
      }

      /* Matrix column characters */
      .matrix-col {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00ff41;
      }
      .m0 { animation: matFall 2.1s 0.0s linear infinite; }
      .m1 { animation: matFall 2.6s 0.3s linear infinite; }
      .m2 { animation: matFall 1.9s 0.7s linear infinite; }
      .m3 { animation: matFall 2.3s 1.1s linear infinite; }
      .m4 { animation: matFall 2.8s 0.5s linear infinite; }
      .m5 { animation: matFall 2.0s 1.4s linear infinite; }
      .m6 { animation: matFall 2.5s 0.2s linear infinite; }
      .m7 { animation: matFall 1.8s 0.9s linear infinite; }
      .m8 { animation: matFall 2.2s 1.7s linear infinite; }
      .m9 { animation: matFall 2.7s 0.6s linear infinite; }
      @keyframes matFall {
        0%   { opacity: 0.8; transform: translateY(-40px); }
        70%  { opacity: 0.4; }
        100% { opacity: 0; transform: translateY(290px); }
      }

      /* Status dot pulse */
      .status-dot {
        fill: #00ff41;
        animation: statusPulse 1.5s ease-in-out infinite;
      }
      @keyframes statusPulse {
        0%, 100% { opacity: 1; r: 4; }
        50%       { opacity: 0.4; r: 6; }
      }

      /* Bottom bar fill */
      .bar-fill {
        fill: #00ff41;
        animation: barGrow 2.5s 1.8s cubic-bezier(0.4,0,0.2,1) forwards;
        width: 0;
      }
      @keyframes barGrow {
        from { width: 0; }
        to   { width: 680px; }
      }

      /* Cursor blink */
      .cursor {
        fill: #00ff41;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBright" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Scan gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="leftClip"><rect x="0" y="0" width="200" height="280"/></clipPath>
    <clipPath id="rightClip"><rect x="700" y="0" width="200" height="280"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg" rx="8"/>

  <!-- Grid lines -->
  <g opacity="0.3">
    <line x1="0" y1="40" x2="900" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="900" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="900" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="900" y2="240" class="grid-line"/>
    <line x1="60" y1="0" x2="60" y2="280" class="grid-line"/>
    <line x1="840" y1="0" x2="840" y2="280" class="grid-line"/>
  </g>

  <!-- Matrix rain LEFT side -->
  <g clip-path="url(#leftClip)" opacity="0.25">
    <text x="10"  class="matrix-col m0">1 0 1 A F 2 9 B 0 1 C 3 D</text>
    <text x="30"  class="matrix-col m1">A 0 0 1 F 3 9 7 B 2 E 1 D</text>
    <text x="50"  class="matrix-col m2">0 1 B E 3 7 A 0 F 1 2 9 C</text>
    <text x="70"  class="matrix-col m3">F 2 1 0 9 A B 3 7 E D 1 0</text>
    <text x="90"  class="matrix-col m4">3 A 0 F 2 1 E B 9 7 0 D C</text>
    <text x="110" class="matrix-col m5">E 1 9 0 A 3 7 F 2 B D 0 1</text>
    <text x="130" class="matrix-col m6">0 B 2 A 1 F 3 9 7 E 0 D B</text>
    <text x="150" class="matrix-col m7">9 0 A E 1 B 3 F 7 2 D 0 1</text>
    <text x="170" class="matrix-col m8">B 1 0 3 A 7 9 F 2 E D 1 0</text>
    <text x="190" class="matrix-col m9">7 E 0 A 1 B 2 F 9 3 D 0 1</text>
  </g>

  <!-- Matrix rain RIGHT side -->
  <g clip-path="url(#rightClip)" opacity="0.25">
    <text x="710" class="matrix-col m3">1 0 F 2 9 A B 3 E 7 D 0 1</text>
    <text x="730" class="matrix-col m0">A B 2 0 1 F 3 7 9 E D 1 0</text>
    <text x="750" class="matrix-col m6">0 1 E A 3 7 B F 2 9 D 0 1</text>
    <text x="770" class="matrix-col m2">F 0 9 1 A 3 B 7 2 E D 0 1</text>
    <text x="790" class="matrix-col m8">3 A 0 E 1 F B 9 7 2 D 1 0</text>
    <text x="810" class="matrix-col m4">E 1 B 0 A 2 F 3 7 9 D 0 1</text>
    <text x="830" class="matrix-col m7">0 B 1 A 3 7 F 2 9 E D 1 0</text>
    <text x="850" class="matrix-col m1">9 0 A 1 B 3 E F 7 2 D 0 1</text>
    <text x="870" class="matrix-col m5">B 1 0 A 2 F 9 3 7 E D 1 0</text>
    <text x="890" class="matrix-col m9">7 E 1 0 A 9 B 3 F 2 D 1 0</text>
  </g>

  <!-- Corner brackets -->
  <polyline points="20,20 20,8 32,8" class="bracket"/>
  <polyline points="868,20 868,8 856,8" class="bracket" style="animation-delay:0.5s"/>
  <polyline points="20,260 20,272 32,272" class="bracket" style="animation-delay:1s"/>
  <polyline points="868,260 868,272 856,272" class="bracket" style="animation-delay:1.5s"/>

  <!-- Scan line -->
  <line x1="60" y1="0" x2="840" y2="0" class="scanline"/>

  <!-- Status -->
  <circle cx="78" cy="22" r="4" class="status-dot"/>
  <text x="90" y="27" font-family="'Share Tech Mono', monospace" font-size="11" fill="#8b949e">SYSTEM ONLINE — ACTIVELY BUILDING</text>

  <!-- Main name -->
  <text x="450" y="110" text-anchor="middle" class="name-text">DEVANSH SINGH RAJPUT</text>

  <!-- Cursor after name -->
  <rect x="740" y="80" width="3" height="38" class="cursor"/>

  <!-- Subtitle line -->
  <text x="450" y="138" text-anchor="middle" class="subtitle">
    CS Undergrad @ SRM-IST  ·  Research Intern @ IIT(ISM) Dhanbad  ·  2027
  </text>

  <!-- Role tags -->
  <rect x="110" y="160" width="140" height="26" rx="4" class="tag-box tag1"/>
  <text x="180" y="178" text-anchor="middle" class="role1">Edge AI / LLMs</text>

  <rect x="265" y="160" width="130" height="26" rx="4" class="tag-box tag2"/>
  <text x="330" y="178" text-anchor="middle" class="role2">MLOps &amp; Systems</text>

  <rect x="410" y="160" width="130" height="26" rx="4" class="tag-box tag3"/>
  <text x="475" y="178" text-anchor="middle" class="role3">Data Science</text>

  <rect x="555" y="160" width="140" height="26" rx="4" class="tag-box tag4"/>
  <text x="625" y="178" text-anchor="middle" class="role4">Agentic Systems</text>

  <!-- Bottom progress bar track -->
  <rect x="110" y="228" width="680" height="2" rx="1" fill="#ffffff10"/>
  <!-- Animated fill -->
  <rect x="110" y="228" width="0" height="2" rx="1" class="bar-fill" id="barFill"/>

  <!-- Bottom text -->
  <text x="110" y="255" font-family="'Share Tech Mono', monospace" font-size="11" fill="#444d56">
    CGPA 8.891  ·  47+ REPOS  ·  AMAZON ML SUMMER SCHOOL '25  ·  WEB MASTER @ACM-SRM
  </text>
  <text x="790" y="255" font-family="'Share Tech Mono', monospace" font-size="11" fill="#00ff4160" text-anchor="end">
    devanshsingh.dev
  </text>

  <!-- Inline bar-fill animation fix (SVG animateTransform alternative) -->
  <animate xlink:href="#barFill" attributeName="width" from="0" to="680" dur="2.5s" begin="1.8s" fill="freeze"/>
</svg>
