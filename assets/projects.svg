  <g transform="translate(462, 240)">
    <rect width="418" height="148" rx="10" class="card" stroke="#10b98130"/>
    <rect x="0" y="0" width="418" height="3" rx="10" fill="#10b981" opacity="0.6"/>
    <rect width="418" height="148" rx="10" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="140 992" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1132;0" dur="7s" begin="1.5s" repeatCount="indefinite"/>
    </rect>

    <circle cx="22" cy="28" r="4" fill="#10b981" opacity="0.8"/>
    <text x="34" y="32" class="fn card-title" fill="#34d399">Learning Agent System</text>
    <text x="34" y="44" class="fn card-sub">Multi-Agent Autonomous Assistant</text>

    <text x="16" y="66" class="fm card-desc">LangGraph system: tool-use, memory, and planning agents.</text>
    <text x="16" y="79" class="fm card-desc">ChromaDB semantic retrieval. Deployed on Streamlit Cloud.</text>
    <text x="16" y="92" class="fm card-desc">One of my first production agentic systems; still running.</text>

    <rect x="16" y="103" width="56" height="14" rx="7" fill="#10b98110" stroke="#10b98135" stroke-width="0.5"/>
    <text x="44" y="113" class="fn tag" fill="#34d399">LangGraph</text>
    <rect x="77" y="103" width="56" height="14" rx="7" fill="#10b98110" stroke="#10b98135" stroke-width="0.5"/>
    <text x="105" y="113" class="fn tag" fill="#34d399">ChromaDB</text>
    <rect x="138" y="103" width="56" height="14" rx="7" fill="#10b98110" stroke="#10b98135" stroke-width="0.5"/>
    <text x="166" y="113" class="fn tag" fill="#34d399">Streamlit</text>
    <rect x="199" y="103" width="30" height="14" rx="7" fill="#10b98110" stroke="#10b98135" stroke-width="0.5"/>
    <text x="214" y="113" class="fn tag" fill="#34d399">RAG</text>

    <text x="16" y="136" class="fn card-footer" fill="#10b981">Deployed multi-agent architecture</text>
  </g>

  <!-- ========== ROW 3: Two wider cards ========== -->

  <!-- Card 5: Hindi Toxicity Bias -->
  <g transform="translate(20, 406)">
    <rect width="424" height="148" rx="10" class="card" stroke="#eab30830"/>
    <rect x="0" y="0" width="424" height="3" rx="10" fill="#eab308" opacity="0.6"/>
    <rect width="424" height="148" rx="10" fill="none" stroke="#eab308" stroke-width="1" stroke-dasharray="140 1004" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1144;0" dur="7s" begin="2.5s" repeatCount="indefinite"/>
    </rect>

    <circle cx="22" cy="28" r="4" fill="#eab308" opacity="0.8"/>
    <text x="34" y="32" class="fn card-title" fill="#fbbf24">Hindi-Toxicity-Bias</text>
    <text x="34" y="44" class="fn card-sub">NLP Fairness Research — Bias Mitigation</text>

    <text x="16" y="66" class="fm card-desc">HASOC '21. Counterfactual augmentation + adversarial training</text>
    <text x="16" y="79" class="fm card-desc">Reduces bias in Hindi toxicity classifiers; maintains F1 score.</text>
    <text x="16" y="92" class="fm card-desc">Fairness-focused NLP research that matters more than it trends.</text>

    <rect x="16" y="103" width="30" height="14" rx="7" fill="#eab30810" stroke="#eab30835" stroke-width="0.5"/>
    <text x="31" y="113" class="fn tag" fill="#fbbf24">NLP</text>
    <rect x="51" y="103" width="30" height="14" rx="7" fill="#eab30810" stroke="#eab30835" stroke-width="0.5"/>
    <text x="66" y="113" class="fn tag" fill="#fbbf24">CDA</text>
    <rect x="86" y="103" width="60" height="14" rx="7" fill="#eab30810" stroke="#eab30835" stroke-width="0.5"/>
    <text x="116" y="113" class="fn tag" fill="#fbbf24">Adversarial</text>
    <rect x="151" y="103" width="54" height="14" rx="7" fill="#eab30810" stroke="#eab30835" stroke-width="0.5"/>
    <text x="178" y="113" class="fn tag" fill="#fbbf24">HASOC '21</text>

    <text x="16" y="136" class="fn card-footer" fill="#eab308">Fairness research for low-resource languages</text>
  </g>

  <!-- Card 6: FleetTax -->
  <g transform="translate(462, 406)">
    <rect width="418" height="148" rx="10" class="card" stroke="#ec489930"/>
    <rect x="0" y="0" width="418" height="3" rx="10" fill="#ec4899" opacity="0.6"/>
    <rect width="418" height="148" rx="10" fill="none" stroke="#ec4899" stroke-width="1" stroke-dasharray="140 992" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1132;0" dur="7s" begin="3s" repeatCount="indefinite"/>
    </rect>

    <circle cx="22" cy="28" r="4" fill="#ec4899" opacity="0.8"/>
    <text x="34" y="32" class="fn card-title" fill="#f472b6">FleetTax</text>
    <text x="34" y="44" class="fn card-sub">Flutter Android — Built Overnight</text>

    <text x="16" y="66" class="fm card-desc">Vahan 4.0 road tax tracker for fleets. Built overnight with</text>
    <text x="16" y="79" class="fm card-desc">zero prior Flutter experience for my dad's transport fleet.</text>
    <text x="16" y="92" class="fm card-desc">Real problem, real users, shipped same night. Still running.</text>

    <rect x="16" y="103" width="42" height="14" rx="7" fill="#ec489910" stroke="#ec489935" stroke-width="0.5"/>
    <text x="37" y="113" class="fn tag" fill="#f472b6">Flutter</text>
    <rect x="63" y="103" width="54" height="14" rx="7" fill="#ec489910" stroke="#ec489935" stroke-width="0.5"/>
    <text x="90" y="113" class="fn tag" fill="#f472b6">Vahan 4.0</text>
    <rect x="122" y="103" width="46" height="14" rx="7" fill="#ec489910" stroke="#ec489935" stroke-width="0.5"/>
    <text x="145" y="113" class="fn tag" fill="#f472b6">Android</text>
    <rect x="173" y="103" width="42" height="14" rx="7" fill="#ec489910" stroke="#ec489935" stroke-width="0.5"/>
    <text x="194" y="113" class="fn tag" fill="#f472b6">Family</text>

    <text x="16" y="136" class="fn card-footer" fill="#ec4899">Zero-to-shipped overnight</text>
  </g>

  <!-- Footer -->
  <line x1="30" y1="566" x2="870" y2="566" stroke="#1e293b" stroke-width="0.75"/>
  <text x="870" y="576" text-anchor="end" class="fm" font-size="9" fill="#475569">github.com/DevanshSrajput</text>
</svg>
