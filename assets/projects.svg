<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" width="900" height="620">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .bg { fill: #0d1117; }
      .card { fill: #161b22; stroke-width: 1; rx: 6; }
      .c-green  { stroke: #00ff41; }
      .c-blue   { stroke: #00bfff; }
      .c-orange { stroke: #ff6b35; }
      .c-purple { stroke: #a371f7; }
      .c-pink   { stroke: #f778ba; }
      .c-yellow { stroke: #ffd700; }
      .c-cyan   { stroke: #00e5ff; }

      .title { font-family: 'Share Tech Mono', monospace; font-size: 13px; font-weight: bold; }
      .desc  { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: #8b949e; }
      .tag   { font-family: 'Share Tech Mono', monospace; font-size: 9px; }
      .icon  { font-family: 'Share Tech Mono', monospace; font-size: 18px; }
      .star  { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: #ffd70099; }

      .t-green  { fill: #00ff41; }
      .t-blue   { fill: #00bfff; }
      .t-orange { fill: #ff6b35; }
      .t-purple { fill: #a371f7; }
      .t-pink   { fill: #f778ba; }
      .t-yellow { fill: #ffd700; }
      .t-cyan   { fill: #00e5ff; }

      .tag-bg-green  { fill: #00ff4115; stroke: #00ff4140; stroke-width: 0.5; }
      .tag-bg-blue   { fill: #00bfff15; stroke: #00bfff40; stroke-width: 0.5; }
      .tag-bg-orange { fill: #ff6b3515; stroke: #ff6b3540; stroke-width: 0.5; }
      .tag-bg-purple { fill: #a371f715; stroke: #a371f740; stroke-width: 0.5; }
      .tag-bg-pink   { fill: #f778ba15; stroke: #f778ba40; stroke-width: 0.5; }
      .tag-bg-yellow { fill: #ffd70015; stroke: #ffd70040; stroke-width: 0.5; }
      .tag-bg-cyan   { fill: #00e5ff15; stroke: #00e5ff40; stroke-width: 0.5; }

      /* Card entrance animations - staggered */
      .card-wrap { opacity: 0; }
      .cw0 { animation: cardIn 0.5s 0.1s ease forwards; }
      .cw1 { animation: cardIn 0.5s 0.3s ease forwards; }
      .cw2 { animation: cardIn 0.5s 0.5s ease forwards; }
      .cw3 { animation: cardIn 0.5s 0.7s ease forwards; }
      .cw4 { animation: cardIn 0.5s 0.9s ease forwards; }
      .cw5 { animation: cardIn 0.5s 1.1s ease forwards; }
      .cw6 { animation: cardIn 0.5s 1.3s ease forwards; }
      @keyframes cardIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Glow pulse per card accent color */
      .glow-green  { animation: glowG 3s 1.5s ease-in-out infinite alternate; }
      .glow-blue   { animation: glowB 3s 1.8s ease-in-out infinite alternate; }
      .glow-orange { animation: glowO 3s 2.1s ease-in-out infinite alternate; }
      .glow-purple { animation: glowP 3s 1.6s ease-in-out infinite alternate; }
      .glow-pink   { animation: glowPk 3s 1.9s ease-in-out infinite alternate; }
      .glow-yellow { animation: glowY 3s 2.2s ease-in-out infinite alternate; }
      .glow-cyan   { animation: glowC 3s 1.7s ease-in-out infinite alternate; }
      @keyframes glowG  { from { filter: drop-shadow(0 0 2px #00ff4140); } to { filter: drop-shadow(0 0 8px #00ff4180); } }
      @keyframes glowB  { from { filter: drop-shadow(0 0 2px #00bfff40); } to { filter: drop-shadow(0 0 8px #00bfff80); } }
      @keyframes glowO  { from { filter: drop-shadow(0 0 2px #ff6b3540); } to { filter: drop-shadow(0 0 8px #ff6b3580); } }
      @keyframes glowP  { from { filter: drop-shadow(0 0 2px #a371f740); } to { filter: drop-shadow(0 0 8px #a371f780); } }
      @keyframes glowPk { from { filter: drop-shadow(0 0 2px #f778ba40); } to { filter: drop-shadow(0 0 8px #f778ba80); } }
      @keyframes glowY  { from { filter: drop-shadow(0 0 2px #ffd70040); } to { filter: drop-shadow(0 0 8px #ffd70080); } }
      @keyframes glowC  { from { filter: drop-shadow(0 0 2px #00e5ff40); } to { filter: drop-shadow(0 0 8px #00e5ff80); } }

      /* Top accent bar animation */
      .accent-bar { height: 2px; }
      .ab0 { animation: barW 0.8s 0.1s ease forwards; width: 0; }
      .ab1 { animation: barW 0.8s 0.3s ease forwards; width: 0; }
      .ab2 { animation: barW 0.8s 0.5s ease forwards; width: 0; }
      .ab3 { animation: barW 0.8s 0.7s ease forwards; width: 0; }
      .ab4 { animation: barW 0.8s 0.9s ease forwards; width: 0; }
      .ab5 { animation: barW 0.8s 1.1s ease forwards; width: 0; }
      .ab6 { animation: barW 0.8s 1.3s ease forwards; width: 0; }
      @keyframes barW { from { width: 0; } to { width: 100%; } }

      .section-header { font-family: 'Share Tech Mono', monospace; font-size: 15px; fill: #00ff41; }
      .section-sub { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #444d56; }
    </style>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="620" class="bg" rx="8"/>

  <!-- Section header -->
  <text x="20" y="30" class="section-header">&gt; ls ./projects --top</text>
  <text x="20" y="48" class="section-sub">7 entries · sorted by impact</text>
  <line x1="20" y1="56" x2="880" y2="56" stroke="#00ff4125" stroke-width="1"/>

  <!-- ═══ ROW 1: 3 cards ═══ -->

  <!-- Card 0: HiSLM -->
  <g class="card-wrap cw0">
    <g class="glow-green">
      <rect x="18" y="70" width="274" height="148" rx="6" class="card c-green"/>
      <rect x="18" y="70" width="0" height="2" rx="1" fill="#00ff41" class="ab0"><animate attributeName="width" from="0" to="274" dur="0.8s" begin="0.1s" fill="freeze"/></rect>
      <text x="36" y="98" class="icon t-green">⬡</text>
      <text x="60" y="96" class="title t-green">HiSLM</text>
      <text x="60" y="111" class="desc">Distributed SLM inference</text>
      <text x="26" y="130" class="desc">Jetson AGX Orin + Orin NX over TailScale mesh.</text>
      <text x="26" y="143" class="desc">FastAPI servers, WebSocket UI, Qwen2.5 fine-tuned</text>
      <text x="26" y="156" class="desc">on medical + mining domain data. Real hardware.</text>
      <!-- Tags -->
      <rect x="26"  y="168" width="52" height="16" rx="3" class="tag-bg-green"/>
      <text x="52"  y="180" text-anchor="middle" class="tag t-green">llama.cpp</text>
      <rect x="84"  y="168" width="46" height="16" rx="3" class="tag-bg-green"/>
      <text x="107" y="180" text-anchor="middle" class="tag t-green">FastAPI</text>
      <rect x="136" y="168" width="60" height="16" rx="3" class="tag-bg-green"/>
      <text x="166" y="180" text-anchor="middle" class="tag t-green">Edge AI</text>
      <rect x="202" y="168" width="56" height="16" rx="3" class="tag-bg-green"/>
      <text x="230" y="180" text-anchor="middle" class="tag t-green">NVIDIA</text>
      <!-- Star indicator -->
      <text x="26" y="208" class="star">★ IIT(ISM) Dhanbad Research · Jun 2025</text>
    </g>
  </g>

  <!-- Card 1: NexusPay -->
  <g class="card-wrap cw1">
    <g class="glow-blue">
      <rect x="312" y="70" width="274" height="148" rx="6" class="card c-blue"/>
      <rect x="312" y="70" width="0" height="2" rx="1" fill="#00bfff"><animate attributeName="width" from="0" to="274" dur="0.8s" begin="0.3s" fill="freeze"/></rect>
      <text x="330" y="98" class="icon t-blue">⬡</text>
      <text x="354" y="96" class="title t-blue">NexusPay</text>
      <text x="354" y="111" class="desc">Autonomous AI payment agent</text>
      <text x="320" y="130" class="desc">Pay-per-call AI via x402 protocol. Budget caps,</text>
      <text x="320" y="143" class="desc">SQLite audit logs, Gemini synthesis. Agentic</text>
      <text x="320" y="156" class="desc">architecture with per-request billing built in.</text>
      <rect x="320" y="168" width="56" height="16" rx="3" class="tag-bg-blue"/>
      <text x="348" y="180" text-anchor="middle" class="tag t-blue">x402</text>
      <rect x="382" y="168" width="54" height="16" rx="3" class="tag-bg-blue"/>
      <text x="409" y="180" text-anchor="middle" class="tag t-blue">Gemini</text>
      <rect x="442" y="168" width="56" height="16" rx="3" class="tag-bg-blue"/>
      <text x="470" y="180" text-anchor="middle" class="tag t-blue">SQLite</text>
      <rect x="504" y="168" width="52" height="16" rx="3" class="tag-bg-blue"/>
      <text x="530" y="180" text-anchor="middle" class="tag t-blue">Agents</text>
      <text x="320" y="208" class="star">★ Autonomous · Per-call billing · Full audit trail</text>
    </g>
  </g>

  <!-- Card 2: Data Analyst Agent -->
  <g class="card-wrap cw2">
    <g class="glow-orange">
      <rect x="608" y="70" width="274" height="148" rx="6" class="card c-orange"/>
      <rect x="608" y="70" width="0" height="2" rx="1" fill="#ff6b35"><animate attributeName="width" from="0" to="274" dur="0.8s" begin="0.5s" fill="freeze"/></rect>
      <text x="626" y="98" class="icon t-orange">⬡</text>
      <text x="650" y="96" class="title t-orange">Dataa_Analyst_Agent</text>
      <text x="650" y="111" class="desc">⭐ 21 stars</text>
      <text x="616" y="130" class="desc">Multi-agent LangGraph system for autonomous</text>
      <text x="616" y="143" class="desc">data analysis. Natural language → SQL → charts</text>
      <text x="616" y="156" class="desc">→ insight. Deployed to production. Ships code.</text>
      <rect x="616" y="168" width="62" height="16" rx="3" class="tag-bg-orange"/>
      <text x="647" y="180" text-anchor="middle" class="tag t-orange">LangGraph</text>
      <rect x="684" y="168" width="42" height="16" rx="3" class="tag-bg-orange"/>
      <text x="705" y="180" text-anchor="middle" class="tag t-orange">SQL</text>
      <rect x="732" y="168" width="54" height="16" rx="3" class="tag-bg-orange"/>
      <text x="759" y="180" text-anchor="middle" class="tag t-orange">Agents</text>
      <rect x="792" y="168" width="56" height="16" rx="3" class="tag-bg-orange"/>
      <text x="820" y="180" text-anchor="middle" class="tag t-orange">Prod</text>
      <text x="616" y="208" class="star">★ 21 GitHub stars · Highest in account</text>
    </g>
  </g>

  <!-- ═══ ROW 2: 2 wide cards ═══ -->

  <!-- Card 3: SignalHire -->
  <g class="card-wrap cw3">
    <g class="glow-purple">
      <rect x="18" y="238" width="420" height="148" rx="6" class="card c-purple"/>
      <rect x="18" y="238" width="0" height="2" rx="1" fill="#a371f7"><animate attributeName="width" from="0" to="420" dur="0.8s" begin="0.7s" fill="freeze"/></rect>
      <text x="36" y="266" class="icon t-purple">⬡</text>
      <text x="60" y="264" class="title t-purple">SignalHire</text>
      <text x="60" y="279" class="desc">AI candidate ranking · Redrob Hackathon</text>
      <text x="26" y="298" class="desc">Two-phase unsupervised pipeline: rule-based composite</text>
      <text x="26" y="311" class="desc">scoring then sentence-transformer embeddings. 100K</text>
      <text x="26" y="324" class="desc">candidates, CPU-only, 16GB RAM sandbox. No LLM at</text>
      <text x="26" y="337" class="desc">inference. Built to constraints that matter in the real world.</text>
      <rect x="26"  y="352" width="88" height="16" rx="3" class="tag-bg-purple"/>
      <text x="70"  y="364" text-anchor="middle" class="tag t-purple">MiniLM-L6-v2</text>
      <rect x="120" y="352" width="58" height="16" rx="3" class="tag-bg-purple"/>
      <text x="149" y="364" text-anchor="middle" class="tag t-purple">NLP Rank</text>
      <rect x="184" y="352" width="54" height="16" rx="3" class="tag-bg-purple"/>
      <text x="211" y="364" text-anchor="middle" class="tag t-purple">CPU-only</text>
      <rect x="244" y="352" width="62" height="16" rx="3" class="tag-bg-purple"/>
      <text x="275" y="364" text-anchor="middle" class="tag t-purple">Hackathon</text>
      <text x="26" y="376" class="star">★ India Runs / Redrob AI Hackathon · Constraint-first design</text>
    </g>
  </g>

  <!-- Card 4: Learning Agent System -->
  <g class="card-wrap cw4">
    <g class="glow-pink">
      <rect x="462" y="238" width="420" height="148" rx="6" class="card c-pink"/>
      <rect x="462" y="238" width="0" height="2" rx="1" fill="#f778ba"><animate attributeName="width" from="0" to="420" dur="0.8s" begin="0.9s" fill="freeze"/></rect>
      <text x="480" y="266" class="icon t-pink">⬡</text>
      <text x="504" y="264" class="title t-pink">Learning Agent System</text>
      <text x="504" y="279" class="desc">Multi-agent · Production deployed</text>
      <text x="470" y="298" class="desc">LangGraph-based autonomous learning assistant with</text>
      <text x="470" y="311" class="desc">tool-use, memory, and planning sub-agents. ChromaDB</text>
      <text x="470" y="324" class="desc">for retrieval, deployed on Streamlit. One of the first</text>
      <text x="470" y="337" class="desc">agentic systems in the account. Actually runs in prod.</text>
      <rect x="470" y="352" width="62" height="16" rx="3" class="tag-bg-pink"/>
      <text x="501" y="364" text-anchor="middle" class="tag t-pink">LangGraph</text>
      <rect x="538" y="352" width="62" height="16" rx="3" class="tag-bg-pink"/>
      <text x="569" y="364" text-anchor="middle" class="tag t-pink">ChromaDB</text>
      <rect x="606" y="352" width="62" height="16" rx="3" class="tag-bg-pink"/>
      <text x="637" y="364" text-anchor="middle" class="tag t-pink">Streamlit</text>
      <rect x="674" y="352" width="44" height="16" rx="3" class="tag-bg-pink"/>
      <text x="696" y="364" text-anchor="middle" class="tag t-pink">RAG</text>
      <text x="470" y="376" class="star">★ Deployed · Multi-agent architecture · Tool-augmented</text>
    </g>
  </g>

  <!-- ═══ ROW 3: 2 cards ═══ -->

  <!-- Card 5: Hindi Toxicity Bias -->
  <g class="card-wrap cw5">
    <g class="glow-yellow">
      <rect x="18" y="406" width="420" height="148" rx="6" class="card c-yellow"/>
      <rect x="18" y="406" width="0" height="2" rx="1" fill="#ffd700"><animate attributeName="width" from="0" to="420" dur="0.8s" begin="1.1s" fill="freeze"/></rect>
      <text x="36" y="434" class="icon t-yellow">⬡</text>
      <text x="60" y="432" class="title t-yellow">Hindi-Toxicity-Bias</text>
      <text x="60" y="447" class="desc">NLP Research · Bias Detection</text>
      <text x="26" y="466" class="desc">HASOC 2021 dataset. Counterfactual data augmentation</text>
      <text x="26" y="479" class="desc">+ adversarial training to reduce bias in Hindi toxicity</text>
      <text x="26" y="492" class="desc">classifiers. The kind of NLP research that doesn't trend</text>
      <text x="26" y="505" class="desc">on HN but probably matters more than the stuff that does.</text>
      <rect x="26"  y="520" width="38" height="16" rx="3" class="tag-bg-yellow"/>
      <text x="45"  y="532" text-anchor="middle" class="tag t-yellow">NLP</text>
      <rect x="70"  y="520" width="32" height="16" rx="3" class="tag-bg-yellow"/>
      <text x="86"  y="532" text-anchor="middle" class="tag t-yellow">CDA</text>
      <rect x="108" y="520" width="62" height="16" rx="3" class="tag-bg-yellow"/>
      <text x="139" y="532" text-anchor="middle" class="tag t-yellow">Adversarial</text>
      <rect x="176" y="520" width="58" height="16" rx="3" class="tag-bg-yellow"/>
      <text x="205" y="532" text-anchor="middle" class="tag t-yellow">HASOC'21</text>
      <text x="26" y="544" class="star">★ Bias-aware NLP · Hindi language · Social impact</text>
    </g>
  </g>

  <!-- Card 6: FleetTax -->
  <g class="card-wrap cw6">
    <g class="glow-cyan">
      <rect x="462" y="406" width="420" height="148" rx="6" class="card c-cyan"/>
      <rect x="462" y="406" width="0" height="2" rx="1" fill="#00e5ff"><animate attributeName="width" from="0" to="420" dur="0.8s" begin="1.3s" fill="freeze"/></rect>
      <text x="480" y="434" class="icon t-cyan">⬡</text>
      <text x="504" y="432" class="title t-cyan">FleetTax</text>
      <text x="504" y="447" class="desc">Flutter Android · Built overnight</text>
      <text x="470" y="466" class="desc">Vahan 4.0 road tax deadline tracker for multi-vehicle</text>
      <text x="470" y="479" class="desc">fleets. Built in one night, zero prior Flutter experience,</text>
      <text x="470" y="492" class="desc">because dad's transport business in Bihar needed it.</text>
      <text x="470" y="505" class="desc">Real problem. Real users. Shipped the same night.</text>
      <rect x="470" y="520" width="44" height="16" rx="3" class="tag-bg-cyan"/>
      <text x="492" y="532" text-anchor="middle" class="tag t-cyan">Flutter</text>
      <rect x="520" y="520" width="58" height="16" rx="3" class="tag-bg-cyan"/>
      <text x="549" y="532" text-anchor="middle" class="tag t-cyan">Vahan 4.0</text>
      <rect x="584" y="520" width="56" height="16" rx="3" class="tag-bg-cyan"/>
      <text x="612" y="532" text-anchor="middle" class="tag t-cyan">Android</text>
      <rect x="646" y="520" width="46" height="16" rx="3" class="tag-bg-cyan"/>
      <text x="669" y="532" text-anchor="middle" class="tag t-cyan">Family</text>
      <text x="470" y="544" class="star">★ Zero Flutter exp → shipped overnight · Real-world need</text>
    </g>
  </g>

  <!-- Bottom border -->
  <line x1="20" y1="612" x2="880" y2="612" stroke="#00ff4125" stroke-width="1"/>
  <text x="880" y="608" text-anchor="end" font-family="'Share Tech Mono', monospace" font-size="10" fill="#444d56">github.com/DevanshSrajput</text>
</svg>
