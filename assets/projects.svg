<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" width="900" height="580">
  <defs>
    <style>
      .bg { fill: #06080f; }
      .fn { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; }
      .fm { font-family: 'Courier New',Courier,monospace; }
      .card { fill: #0d1224; stroke-width: 1; rx: 10; }
      .card-title { font-size: 14px; font-weight: 700; }
      .card-sub { font-size: 10px; fill: #64748b; font-weight: 600; }
      .card-desc { font-size: 10px; fill: #94a3b8; }
      .card-footer { font-size: 9px; font-weight: 600; }
      .tag { font-size: 8px; font-weight: 600; text-anchor: middle; }
      .hdr { font-size: 14px; fill: #e0e7ff; font-weight: 700; letter-spacing: 0.5px; }
      .hsub { font-size: 10px; fill: #475569; }
    </style>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="50%" stop-color="#0d1224"/>
      <stop offset="100%" stop-color="#06080f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bg-grad)" rx="10"/>
  <rect width="900" height="580" fill="none" stroke="#1e293b" stroke-width="1" rx="10"/>

  <!-- Header -->
  <text x="30" y="32" class="fn hdr">Featured Projects</text>
  <text x="30" y="46" class="fn hsub">Impact-driven engineering — sorted by complexity</text>
  <line x1="30" y1="56" x2="870" y2="56" stroke="#1e293b" stroke-width="1"/>

  <!-- ========== ROW 1: Three cards ========== -->

  <!-- Card 0: HiSLM -->
  <g transform="translate(20, 68)">
    <rect width="274" height="152" rx="10" class="card" stroke="#f59e0b30"/>
    <!-- Top accent -->
    <rect x="0" y="0" width="274" height="3" rx="10" fill="#f59e0b" opacity="0.6"/>
    <!-- Animated border trace -->
    <rect width="274" height="152" rx="10" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="120 740" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="860;0" dur="6s" repeatCount="indefinite"/>
    </rect>

    <circle cx="22" cy="30" r="4" fill="#f59e0b" opacity="0.8"/>
    <text x="34" y="34" class="fn card-title" fill="#fbbf24">HiSLM</text>
    <text x="34" y="46" class="fn card-sub">Distributed Edge Inference System</text>

    <text x="16" y="68" class="fm card-desc">Jetson AGX Orin + NX cluster running</text>
    <text x="16" y="81" class="fm card-desc">Qwen2.5 over TailScale mesh. FastAPI</text>
    <text x="16" y="94" class="fm card-desc">orchestration for medical QA inference.</text>

    <!-- Tags -->
    <rect x="16" y="106" width="52" height="14" rx="7" fill="#f59e0b10" stroke="#f59e0b35" stroke-width="0.5"/>
    <text x="42" y="116" class="fn tag" fill="#fbbf24">llama.cpp</text>
    <rect x="73" y="106" width="44" height="14" rx="7" fill="#f59e0b10" stroke="#f59e0b35" stroke-width="0.5"/>
    <text x="95" y="116" class="fn tag" fill="#fbbf24">FastAPI</text>
    <rect x="122" y="106" width="48" height="14" rx="7" fill="#f59e0b10" stroke="#f59e0b35" stroke-width="0.5"/>
    <text x="146" y="116" class="fn tag" fill="#fbbf24">Edge AI</text>
    <rect x="175" y="106" width="44" height="14" rx="7" fill="#f59e0b10" stroke="#f59e0b35" stroke-width="0.5"/>
    <text x="197" y="116" class="fn tag" fill="#fbbf24">NVIDIA</text>

    <text x="16" y="140" class="fn card-footer" fill="#f59e0b">IIT(ISM) Dhanbad Research</text>
  </g>

  <!-- Card 1: NexusPay -->
  <g transform="translate(313, 68)">
    <rect width="274" height="152" rx="10" class="card" stroke="#8b5cf630"/>
    <rect x="0" y="0" width="274" height="3" rx="10" fill="#8b5cf6" opacity="0.6"/>
    <rect width="274" height="152" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="120 740" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="860;0" dur="6s" begin="1s" repeatCount="indefinite"/>
    </rect>

    <circle cx="22" cy="30" r="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="34" y="34" class="fn card-title" fill="#a78bfa">NexusPay</text>
    <text x="34" y="46" class="fn card-sub">Autonomous AI Payment Agent</text>

    <text x="16" y="68" class="fm card-desc">Pay-per-call billing via x402 protocol.</text>
    <text x="16" y="81" class="fm card-desc">Budget caps, SQLite audit log, Gemini</text>
    <text x="16" y="94" class="fm card-desc">synthesis. Per-request cost governance.</text>

    <rect x="16" y="106" width="32" height="14" rx="7" fill="#8b5cf610" stroke="#8b5cf635" stroke-width="0.5"/>
    <text x="32" y="116" class="fn tag" fill="#a78bfa">x402</text>
    <rect x="53" y="106" width="44" height="14" rx="7" fill="#8b5cf610" stroke="#8b5cf635" stroke-width="0.5"/>
    <text x="75" y="116" class="fn tag" fill="#a78bfa">Gemini</text>
    <rect x="102" y="106" width="42" height="14" rx="7" fill="#8b5cf610" stroke="#8b5cf635" stroke-width="0.5"/>
    <text x="123" y="116" class="fn tag" fill="#a78bfa">SQLite</text>
    <rect x="149" y="106" width="44" height="14" rx="7" fill="#8b5cf610" stroke="#8b5cf635" stroke-width="0.5"/>
    <text x="171" y="116" class="fn tag" fill="#a78bfa">Agents</text>

    <text x="16" y="140" class="fn card-footer" fill="#8b5cf6">Autonomous agent billing</text>
  </g>

  <!-- Card 2: Dataa_Analyst_Agent -->
  <g transform="translate(606, 68)">
    <rect width="274" height="152" rx="10" class="card" stroke="#f43f5e30"/>
    <rect x="0" y="0" width="274" height="3" rx="10" fill="#f43f5e" opacity="0.6"/>
    <rect width="274" height="152" rx="10" fill="none" stroke="#f43f5e" stroke-width="1" stroke-dasharray="120 740" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="860;0" dur="6s" begin="2s" repeatCount="indefinite"/>
    </rect>

    <circle cx="22" cy="30" r="4" fill="#f43f5e" opacity="0.8"/>
    <text x="34" y="34" class="fn card-title" fill="#fb7185">Dataa_Analyst_Agent</text>
    <text x="34" y="46" class="fn card-sub">NL-to-SQL Multi-Agent Pipeline</text>

    <text x="16" y="68" class="fm card-desc">LangGraph multi-agent: natural language</text>
    <text x="16" y="81" class="fm card-desc">to SQL queries to charts to written</text>
    <text x="16" y="94" class="fm card-desc">insights. Deployed and actively used.</text>

    <rect x="16" y="106" width="56" height="14" rx="7" fill="#f43f5e10" stroke="#f43f5e35" stroke-width="0.5"/>
    <text x="44" y="116" class="fn tag" fill="#fb7185">LangGraph</text>
    <rect x="77" y="106" width="30" height="14" rx="7" fill="#f43f5e10" stroke="#f43f5e35" stroke-width="0.5"/>
    <text x="92" y="116" class="fn tag" fill="#fb7185">SQL</text>
    <rect x="112" y="106" width="44" height="14" rx="7" fill="#f43f5e10" stroke="#f43f5e35" stroke-width="0.5"/>
    <text x="134" y="116" class="fn tag" fill="#fb7185">Agents</text>
    <rect x="161" y="106" width="36" height="14" rx="7" fill="#f43f5e10" stroke="#f43f5e35" stroke-width="0.5"/>
    <text x="179" y="116" class="fn tag" fill="#fb7185">Prod</text>

    <text x="16" y="140" class="fn card-footer" fill="#f43f5e">21 GitHub Stars</text>
  </g>

  <!-- ========== ROW 2: Two wider cards ========== -->

  <!-- Card 3: SignalHire -->
  <g transform="translate(20, 240)">
    <rect width="424" height="148" rx="10" class="card" stroke="#06b6d430"/>
    <rect x="0" y="0" width="424" height="3" rx="10" fill="#06b6d4" opacity="0.6"/>
    <rect width="424" height="148" rx="10" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="140 1004" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="1144;0" dur="7s" begin="0.5s" repeatCount="indefinite"/>
    </rect>

    <circle cx="22" cy="28" r="4" fill="#06b6d4" opacity="0.8"/>
    <text x="34" y="32" class="fn card-title" fill="#22d3ee">SignalHire</text>
    <text x="34" y="44" class="fn card-sub">AI Candidate Ranking — Redrob Hackathon</text>

    <text x="16" y="66" class="fm card-desc">Two-phase pipeline: rule-based scoring + sentence-transformer</text>
    <text x="16" y="79" class="fm card-desc">100K candidates ranked CPU-only in a 16GB RAM sandbox.</text>
    <text x="16" y="92" class="fm card-desc">No LLM at inference; constraint-first hackathon architecture.</text>

    <rect x="16" y="103" width="74" height="14" rx="7" fill="#06b6d410" stroke="#06b6d435" stroke-width="0.5"/>
    <text x="53" y="113" class="fn tag" fill="#22d3ee">MiniLM-L6-v2</text>
    <rect x="95" y="103" width="60" height="14" rx="7" fill="#06b6d410" stroke="#06b6d435" stroke-width="0.5"/>
    <text x="125" y="113" class="fn tag" fill="#22d3ee">NLP Ranking</text>
    <rect x="160" y="103" width="52" height="14" rx="7" fill="#06b6d410" stroke="#06b6d435" stroke-width="0.5"/>
    <text x="186" y="113" class="fn tag" fill="#22d3ee">CPU-only</text>
    <rect x="217" y="103" width="58" height="14" rx="7" fill="#06b6d410" stroke="#06b6d435" stroke-width="0.5"/>
    <text x="246" y="113" class="fn tag" fill="#22d3ee">Hackathon</text>

    <text x="16" y="136" class="fn card-footer" fill="#06b6d4">Redrob Hackathon Finalist</text>
  </g>

